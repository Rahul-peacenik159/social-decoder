name: Social Decode

on:
  workflow_dispatch:
    inputs:
      linkedin_slug:
        description: "LinkedIn company slug (e.g. cyera, descope, stripe)"
        required: true
        type: string
      max_posts:
        description: "Max posts to fetch (default: 10)"
        required: false
        default: "10"
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  decode:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run social decode
        env:
          SCRAPINGDOG_API_KEY: ${{ secrets.SCRAPINGDOG_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python analyze.py "${{ github.event.inputs.linkedin_slug }}" \
            --max-posts "${{ github.event.inputs.max_posts }}"

      - name: Commit output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Rahul-peacenik159/social-decoder.git
          git add output/
          git diff --cached --quiet || git commit -m "decode: ${{ github.event.inputs.linkedin_slug }} $(date -u +%Y%m%d-%H%M)"
          git push

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-decode-${{ github.event.inputs.linkedin_slug }}
          path: output/${{ github.event.inputs.linkedin_slug }}/
          retention-days: 30
